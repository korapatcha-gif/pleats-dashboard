<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pleats by MAMA — Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg:#0f0d0b;--bg2:#1a1612;--bg3:#241e18;
  --card:#1e1a15;--card2:#252018;--border:#332b22;--border2:#3d3328;
  --text:#f5ede3;--muted:#8c7f72;--subtle:#5c5048;
  --accent:#e8965a;--accent2:#f5b87a;--accent3:#7a3e1a;
  --green:#3dba85;--green2:#0f2d20;
  --red:#e05c5c;--red2:#2d0f0f;
  --gold:#f0b429;--gold2:#2d2100;
  --blue:#5b9bd5;--blue2:#0f1f2d;
  --mono:'Space Mono',monospace;
  --body:'Prompt',sans-serif;
}
body{background:var(--bg);color:var(--text);font-family:var(--body);min-height:100vh;overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background-image:linear-gradient(rgba(232,150,90,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(232,150,90,.03) 1px,transparent 1px);
  background-size:40px 40px;}

/* TOPBAR */
.topbar{position:sticky;top:0;z-index:100;background:rgba(15,13,11,.95);backdrop-filter:blur(12px);
  border-bottom:1px solid var(--border);padding:0 24px;height:56px;
  display:flex;align-items:center;justify-content:space-between;}
.brand{display:flex;align-items:center;gap:12px;}
.brand-logo{font-family:var(--mono);font-size:11px;font-weight:700;color:var(--accent);letter-spacing:3px;}
.dv{width:1px;height:16px;background:var(--border);}
.brand-sub{font-size:11px;color:var(--muted);}
.tr{display:flex;align-items:center;gap:10px;}
.live-pill{display:flex;align-items:center;gap:5px;background:var(--green2);border:1px solid var(--green);
  border-radius:20px;padding:3px 10px;font-size:10px;color:var(--green);font-family:var(--mono);}
.live-dot{width:5px;height:5px;border-radius:50%;background:var(--green);animation:blink 2s infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.ts{font-family:var(--mono);font-size:10px;color:var(--subtle);}
.btn{border:1px solid var(--border2);background:var(--card2);color:var(--text);border-radius:8px;
  padding:6px 13px;font-size:12px;font-family:var(--body);cursor:pointer;transition:all .2s;font-weight:600;}
.btn:hover{border-color:var(--accent);color:var(--accent);}
.btn:disabled{opacity:.4;cursor:not-allowed;}
.btn-p{background:var(--accent);border-color:var(--accent);color:#fff;}
.btn-p:hover{background:var(--accent2);border-color:var(--accent2);color:#fff;}

/* PERIOD SELECTOR */
.period-bar{
  background:var(--bg2);border-bottom:1px solid var(--border);
  padding:12px 24px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;
  position:sticky;top:56px;z-index:99;
}
.period-label{font-size:11px;color:var(--muted);font-weight:600;letter-spacing:1px;text-transform:uppercase;margin-right:4px;}
.period-btn{
  border:1px solid var(--border2);background:transparent;color:var(--muted);
  border-radius:100px;padding:5px 14px;font-size:12px;font-family:var(--body);
  cursor:pointer;transition:all .2s;font-weight:500;
}
.period-btn:hover{border-color:var(--accent);color:var(--accent);}
.period-btn.active{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:700;}
.period-range{display:flex;align-items:center;gap:6px;position:relative;}
.period-range span{font-size:11px;color:var(--muted);}
/* Calendar Picker */
.cal-btn{
  border:1px solid var(--border2);background:transparent;color:var(--muted);
  border-radius:100px;padding:5px 14px;font-size:12px;font-family:var(--body);
  cursor:pointer;transition:all .2s;font-weight:500;display:flex;align-items:center;gap:5px;
}
.cal-btn:hover,.cal-btn.active{border-color:var(--accent);color:var(--accent);}
.cal-dropdown{
  position:absolute;top:calc(100% + 8px);right:0;z-index:999;
  background:var(--card);border:1px solid var(--border2);border-radius:16px;
  padding:16px;box-shadow:0 8px 32px rgba(0,0,0,.4);min-width:580px;
  display:none;
}
.cal-dropdown.open{display:flex;flex-direction:column;gap:12px;}
.cal-row{display:flex;gap:16px;}
.cal-month{flex:1;}
.cal-month-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
.cal-month-title{font-size:13px;font-weight:700;color:var(--text);}
.cal-nav{background:none;border:none;color:var(--muted);cursor:pointer;font-size:16px;padding:2px 6px;border-radius:6px;}
.cal-nav:hover{color:var(--accent);}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;}
.cal-dow{text-align:center;font-size:10px;color:var(--muted);padding:4px 0;font-weight:600;}
.cal-day{
  text-align:center;font-size:11px;padding:5px 2px;border-radius:6px;
  cursor:pointer;color:var(--text);transition:all .15s;
}
.cal-day:hover{background:var(--accent);color:#fff;}
.cal-day.empty{cursor:default;}
.cal-day.today{border:1px solid var(--accent);color:var(--accent);}
.cal-day.selected{background:var(--accent);color:#fff;font-weight:700;}
.cal-day.inrange{background:rgba(251,146,60,.2);color:var(--accent);}
.cal-day.disabled{color:var(--subtle);cursor:default;}
.cal-footer{display:flex;align-items:center;justify-content:space-between;gap:8px;padding-top:4px;border-top:1px solid var(--border);}
.cal-label{font-size:11px;color:var(--muted);}
.cal-label span{color:var(--accent);font-weight:700;font-family:var(--mono);}

/* MAIN */
.main{padding:20px 24px;max-width:1400px;margin:0 auto;position:relative;z-index:1;}
.row{display:grid;gap:14px;margin-bottom:18px;}
.r4{grid-template-columns:repeat(4,1fr);}
.r2{grid-template-columns:1fr 1fr;}
.r3{grid-template-columns:2fr 1fr;}
@media(max-width:900px){.r4{grid-template-columns:1fr 1fr;}.r2,.r3{grid-template-columns:1fr;}}
@media(max-width:500px){.r4{grid-template-columns:1fr;}}
.slabel{font-size:10px;font-weight:700;color:var(--muted);letter-spacing:2px;text-transform:uppercase;
  margin-bottom:12px;display:flex;align-items:center;gap:8px;}
.slabel::after{content:'';flex:1;height:1px;background:var(--border);}
.period-title{font-size:13px;font-weight:700;color:var(--accent);margin-left:8px;font-family:var(--mono);}

/* STAT */
.stat{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:18px;
  position:relative;overflow:hidden;transition:transform .2s;}
.stat:hover{transform:translateY(-2px);}
.stat-ac{position:absolute;top:0;left:0;right:0;height:2px;background:var(--sa);}
.stat-icon{font-size:16px;margin-bottom:8px;opacity:.8;}
.stat-lbl{font-size:10px;color:var(--muted);font-weight:600;letter-spacing:1px;text-transform:uppercase;margin-bottom:4px;}
.stat-val{font-family:var(--mono);font-size:clamp(16px,2.5vw,24px);font-weight:700;color:var(--sc);line-height:1.1;}
.stat-sub{font-size:11px;color:var(--muted);margin-top:4px;}
.badge{display:inline-flex;align-items:center;gap:3px;font-size:10px;font-weight:700;padding:2px 8px;border-radius:100px;margin-top:4px;}
.up{background:var(--green2);color:var(--green);}
.dn{background:var(--red2);color:var(--red);}
.eq{background:var(--border);color:var(--muted);}

/* CARD */
.card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:18px;}
.card-hd{font-size:12px;font-weight:700;color:var(--text);margin-bottom:14px;display:flex;align-items:center;justify-content:space-between;}

/* CHART */
.chart-wrap{display:flex;align-items:flex-end;gap:3px;height:130px;overflow-x:auto;padding-bottom:4px;}
.bar-g{flex:0 0 auto;min-width:28px;max-width:48px;flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;position:relative;}
.bar-g .b{width:100%;border-radius:3px 3px 0 0;background:var(--accent3);transition:height .6s cubic-bezier(.34,1.56,.64,1);min-height:2px;cursor:pointer;position:relative;}
.bar-g .b:hover{background:var(--accent2);}
.bar-g .b.peak{background:var(--accent);}
.bar-g .b .tip{
  display:none;position:absolute;bottom:calc(100%+6px);left:50%;transform:translateX(-50%);
  background:var(--bg2);border:1px solid var(--border2);border-radius:6px;
  padding:5px 9px;font-size:10px;color:var(--text);white-space:nowrap;font-family:var(--mono);z-index:10;
  pointer-events:none;
}
.bar-g .b:hover .tip{display:block;}
.bar-g .lbl{font-size:8px;color:var(--muted);white-space:nowrap;text-align:center;}

/* COMPARISON ROW */
.cmp-row{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--border);}
.cmp-row:last-child{border-bottom:none;}
.cmp-lbl{font-size:12px;font-weight:600;flex:1;}
.cmp-bar-wrap{flex:2;background:var(--border);border-radius:3px;height:6px;overflow:hidden;}
.cmp-bar{height:100%;border-radius:3px;background:var(--accent3);transition:width .7s ease;}
.cmp-bar.cur{background:var(--accent);}
.cmp-val{font-family:var(--mono);font-size:11px;color:var(--accent);white-space:nowrap;text-align:right;min-width:80px;}

/* TABLE */
.tbl{width:100%;border-collapse:collapse;font-size:12px;}
.tbl th{text-align:left;padding:7px 10px;font-size:9px;font-weight:700;color:var(--muted);letter-spacing:1.5px;text-transform:uppercase;border-bottom:1px solid var(--border);}
.tbl td{padding:9px 10px;border-bottom:1px solid var(--border);vertical-align:middle;}
.tbl tr:last-child td{border-bottom:none;}
.tbl tr:hover td{background:var(--card2);}

/* ORDER ROW */
.order-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border);}
.order-row:last-child{border-bottom:none;}
.o-dot{width:6px;height:6px;border-radius:50%;background:var(--green);flex-shrink:0;}
.o-info{flex:1;min-width:0;}
.o-name{font-size:12px;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.o-meta{font-size:10px;color:var(--muted);margin-top:1px;}
.o-amt{font-family:var(--mono);font-size:12px;font-weight:700;color:var(--green);white-space:nowrap;}

/* PROD */
.prod-item{margin-bottom:10px;}
.prod-top{display:flex;justify-content:space-between;font-size:11px;margin-bottom:4px;}
.prod-name{font-weight:700;}
.prod-val{font-family:var(--mono);color:var(--accent);}
.prog{background:var(--border);border-radius:3px;height:5px;overflow:hidden;}
.prog-fill{height:100%;border-radius:3px;background:var(--accent3);transition:width .8s ease;}
.prog-fill.top{background:var(--accent);}

/* LOADER */
.loader{position:fixed;inset:0;background:var(--bg);z-index:200;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;}
.spinner{width:32px;height:32px;border:2px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
.loader-text{font-size:13px;color:var(--muted);}
.empty{text-align:center;padding:24px;color:var(--subtle);font-size:12px;}

/* SKELETON */
@keyframes shimmer{0%{background-position:-400px 0}100%{background-position:400px 0}}
.skel{border-radius:6px;background:linear-gradient(90deg,var(--border) 25%,var(--border2) 50%,var(--border) 75%);background-size:800px 100%;animation:shimmer 1.4s infinite linear;}
.skel-h{height:14px;margin-bottom:8px;}
.skel-sm{height:10px;width:60%;}
.skel-val{height:28px;width:55%;margin-bottom:6px;}
.skel-bar{height:6px;margin-top:10px;}

/* YEARLY COMPARE */
.yr-row{display:grid;grid-template-columns:60px 1fr 90px 70px;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border);}
.yr-row:last-child{border-bottom:none;}
.yr-label{font-family:var(--mono);font-size:12px;font-weight:700;color:var(--accent);}

/* TOP CUSTOMERS */
.cust-row{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--border);}
.cust-row:last-child{border-bottom:none;}
.cust-rank{font-family:var(--mono);font-size:11px;font-weight:700;color:var(--muted);width:18px;text-align:center;flex-shrink:0;}
.cust-rank.top1{color:var(--gold);}
.cust-rank.top2{color:#c0c0c0;}
.cust-rank.top3{color:#cd7f32;}
.cust-info{flex:1;min-width:0;}
.cust-name{font-size:12px;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.cust-meta{font-size:10px;color:var(--muted);margin-top:1px;}
.cust-bar-wrap{flex:1.5;background:var(--border);border-radius:3px;height:5px;overflow:hidden;}
.cust-bar{height:100%;border-radius:3px;background:var(--accent3);transition:width .8s ease;}
.cust-bar.top{background:var(--accent);}
.cust-amt{font-family:var(--mono);font-size:11px;font-weight:700;color:var(--accent);white-space:nowrap;text-align:right;min-width:70px;}

/* ADD ORDER */
.form-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:300;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(4px);}
.form-box{background:var(--bg2);border:1px solid var(--border2);border-radius:16px;padding:26px;width:400px;max-width:95vw;}
.form-title{font-size:14px;font-weight:700;margin-bottom:18px;color:var(--accent);}
.fg{margin-bottom:12px;}
.fg label{display:block;font-size:10px;color:var(--muted);font-weight:700;letter-spacing:1px;text-transform:uppercase;margin-bottom:5px;}
.fi{width:100%;background:var(--bg3);border:1px solid var(--border2);border-radius:8px;padding:8px 12px;color:var(--text);font-family:var(--body);font-size:13px;outline:none;}
.fi:focus{border-color:var(--accent);}
select.fi option{background:var(--bg3);}
.fr{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.fa{display:flex;gap:8px;margin-top:16px;}
</style>
</head>
<body>

<div class="loader" id="loader">
  <div class="spinner"></div>
  <div class="loader-text" id="loader-text">กำลังโหลดข้อมูล...</div>
</div>

<!-- ADD ORDER FORM -->
<div class="form-overlay" id="form-overlay" style="display:none">
  <div class="form-box">
    <div class="form-title">➕ เพิ่มออเดอร์ใหม่</div>
    <div class="fr">
      <div class="fg"><label>วันที่</label><input class="fi" type="date" id="f-date"></div>
      <div class="fg"><label>ช่องทาง</label>
        <select class="fi" id="f-channel">
          <option>FB Live</option><option>LINE OA</option>
          <option>TikTok Live</option><option>หน้าร้าน</option><option>อื่นๆ</option>
        </select>
      </div>
    </div>
    <div class="fg"><label>ชื่อลูกค้า</label><input class="fi" id="f-customer" placeholder="ชื่อ FB / LINE"></div>
    <div class="fr">
      <div class="fg"><label>รหัสสินค้า</label><input class="fi" id="f-sku" placeholder="SH167"></div>
      <div class="fg"><label>จำนวน</label><input class="fi" type="number" id="f-qty" value="1" min="1"></div>
    </div>
    <div class="fg"><label>ยอดรวม (฿)</label><input class="fi" type="number" id="f-amount" placeholder="0"></div>
    <div class="fa">
      <button class="btn btn-p" style="flex:1" onclick="submitOrder()">✅ บันทึก</button>
      <button class="btn" onclick="closeForm()">ยกเลิก</button>
    </div>
  </div>
</div>

<!-- TOPBAR -->
<div class="topbar">
  <div class="brand">
    <div class="brand-logo">PLEATS BY MAMA</div>
    <div class="dv"></div>
    <div class="brand-sub">Sales Dashboard</div>
  </div>
  <div class="tr">
    <div class="live-pill"><div class="live-dot"></div>LIVE</div>
    <div class="ts" id="ts">—</div>
    <button class="btn" onclick="loadData()" id="btn-refresh">🔄</button>
    <button class="btn btn-p" onclick="openForm()">➕ เพิ่มออเดอร์</button>
  </div>
</div>

<!-- PERIOD SELECTOR -->
<div class="period-bar">
  <span class="period-label">ช่วงเวลา</span>
  <button class="period-btn active" onclick="setPeriod('today')"    id="p-today">วันนี้</button>
  <button class="period-btn"        onclick="setPeriod('yesterday')" id="p-yesterday">เมื่อวาน</button>
  <button class="period-btn"        onclick="setPeriod('7days')"    id="p-7days">7 วันล่าสุด</button>
  <button class="period-btn"        onclick="setPeriod('30days')"   id="p-30days">30 วัน</button>
  <button class="period-btn"        onclick="setPeriod('thisMonth')" id="p-thisMonth">เดือนนี้</button>
  <button class="period-btn"        onclick="setPeriod('lastMonth')" id="p-lastMonth">เดือนที่แล้ว</button>
  <button class="period-btn"        onclick="setPeriod('thisYear')" id="p-thisYear">ปีนี้</button>
  <div class="period-range" id="custom-range">
    <button class="cal-btn" id="p-custom" onclick="toggleCal()">📅 <span id="cal-display">เลือกวันที่</span></button>
    <div class="cal-dropdown" id="cal-dropdown">
      <div class="cal-row">
        <div class="cal-month" id="cal-left"></div>
        <div class="cal-month" id="cal-right"></div>
      </div>
      <div class="cal-footer">
        <div class="cal-label">เริ่ม: <span id="cal-s-lbl">-</span> &nbsp; ถึง: <span id="cal-e-lbl">-</span></div>
        <button class="btn btn-p" onclick="applyCustom()" style="padding:4px 16px;font-size:11px">ตกลง</button>
      </div>
    </div>
  </div>
</div>

<div class="main" id="main" style="display:none">

  <!-- PERIOD STATS -->
  <div class="slabel">สรุปช่วงเวลาที่เลือก <span class="period-title" id="period-title"></span></div>
  <div class="row r4" id="period-stats"></div>

  <!-- CHART + PRODUCTS -->
  <div class="row r2">
    <div class="card">
      <div class="card-hd"><span id="chart-title">📊 ยอดขายรายวัน</span></div>
      <div class="chart-wrap" id="main-chart"></div>
    </div>
    <div class="card">
      <div class="card-hd">🔥 สินค้าขายดี (ช่วงที่เลือก)</div>
      <div id="products"></div>
    </div>
  </div>

  <!-- COMPARISON + RECENT -->
  <div class="row r2">
    <!-- PERIOD COMPARISON -->
    <div class="card">
      <div class="card-hd">📈 เปรียบเทียบช่วงเวลา</div>
      <div id="comparison"></div>
    </div>
    <!-- RECENT ORDERS -->
    <div class="card">
      <div class="card-hd">🛍️ ออเดอร์ล่าสุด (ช่วงที่เลือก)</div>
      <div id="recent"></div>
    </div>
  </div>

  <!-- TOP CUSTOMERS + YEARLY -->
  <div class="row r2">
    <div class="card">
      <div class="card-hd">🏆 ลูกค้าซื้อมากที่สุด <span style="font-size:10px;color:var(--muted);font-weight:400">(ช่วงที่เลือก)</span></div>
      <div id="top-customers"></div>
    </div>
    <div class="card">
      <div class="card-hd" style="margin-bottom:10px">📅 เปรียบเทียบรายปี</div>
      <div id="yearly"></div>
    </div>
  </div>

</div>

<script>
const API_URL = 'https://script.google.com/macros/s/AKfycbxCasOEp-raGwptkOOU4ioHvDJCFL2nBrBP6TFUohMxc4g4U2b6VZsVOvFQSvy_c_zE5g/exec';
let RAW = null;
let PERIOD = 'today';
let CUSTOM_START = null, CUSTOM_END = null;

function fmt(n){ return (+n||0).toLocaleString('th-TH',{minimumFractionDigits:0,maximumFractionDigits:0}); }
function fmtDate(d){ return d.toLocaleDateString('th-TH',{day:'2-digit',month:'short'}); }
function fmtMonth(d){ return d.toLocaleDateString('th-TH',{month:'long',year:'numeric'}); }

// ── ช่วงเวลา ──────────────────────────────────────────────
function getPeriodRange(period) {
  const now = new Date();
  const d   = (y,m,day,h=0,mi=0,s=0) => new Date(y,m,day,h,mi,s);
  const today = d(now.getFullYear(),now.getMonth(),now.getDate());
  const todayEnd = d(now.getFullYear(),now.getMonth(),now.getDate(),23,59,59);

  switch(period) {
    case 'today':
      return { start:today, end:todayEnd, label:'วันนี้ '+fmtDate(today), chartUnit:'hour' };
    case 'yesterday': {
      const y = new Date(today); y.setDate(y.getDate()-1);
      const ye = new Date(y); ye.setHours(23,59,59);
      return { start:y, end:ye, label:'เมื่อวาน '+fmtDate(y), chartUnit:'hour' };
    }
    case '7days': {
      const s = new Date(today); s.setDate(s.getDate()-6);
      return { start:s, end:todayEnd, label:'7 วันล่าสุด', chartUnit:'day' };
    }
    case '30days': {
      const s = new Date(today); s.setDate(s.getDate()-29);
      return { start:s, end:todayEnd, label:'30 วันล่าสุด', chartUnit:'day' };
    }
    case 'thisMonth': {
      const s = d(now.getFullYear(),now.getMonth(),1);
      return { start:s, end:todayEnd, label:fmtMonth(now), chartUnit:'day' };
    }
    case 'lastMonth': {
      const s = d(now.getFullYear(),now.getMonth()-1,1);
      const e = d(now.getFullYear(),now.getMonth(),0,23,59,59);
      return { start:s, end:e, label:'เดือนที่แล้ว '+fmtMonth(s), chartUnit:'day' };
    }
    case 'thisYear': {
      const s = d(now.getFullYear(),0,1);
      return { start:s, end:todayEnd, label:'ปี '+now.getFullYear(), chartUnit:'month' };
    }
    case 'custom':
      if (CUSTOM_START && CUSTOM_END)
        return { start:CUSTOM_START, end:new Date(CUSTOM_END.getTime()+86399999), label:`${fmtDate(CUSTOM_START)} — ${fmtDate(CUSTOM_END)}`, chartUnit:'day' };
      return getPeriodRange('today');
    default:
      return getPeriodRange('today');
  }
}

// ── filter rows ───────────────────────────────────────────
function filterRows(rows, start, end) {
  return rows.filter(r => {
    const d = new Date(r.ts);
    return d >= start && d <= end;
  });
}

// ── previous period (สำหรับเปรียบเทียบ) ─────────────────
function getPrevRange(period, start, end) {
  const diff = end - start;
  const ps   = new Date(start.getTime() - diff - 1);
  const pe   = new Date(start.getTime() - 1);
  let label  = 'ช่วงก่อนหน้า';
  if (period==='today'||period==='yesterday') label='วันก่อนหน้า';
  else if (period==='7days') label='7 วันก่อนหน้า';
  else if (period==='30days') label='30 วันก่อนหน้า';
  else if (period==='thisMonth') label='เดือนที่แล้ว';
  else if (period==='lastMonth') label='2 เดือนก่อน';
  else if (period==='thisYear') label='ปีที่แล้ว';
  return { start:ps, end:pe, label };
}

function setPeriod(p) {
  PERIOD = p;
  document.querySelectorAll('.period-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('p-'+p)?.classList.add('active');
  document.getElementById('p-custom')?.classList.remove('active');
  closeCal();
  if (p !== 'custom') renderPeriod();
}

// ── CALENDAR PICKER ────────────────────────────────────
let calOpen=false, calSelStart=null, calSelEnd=null;
let calLeftYear, calLeftMonth, calRightYear, calRightMonth;

function initCal() {
  const now = new Date();
  calRightYear=now.getFullYear(); calRightMonth=now.getMonth();
  calLeftYear=now.getFullYear(); calLeftMonth=now.getMonth()-1;
  if(calLeftMonth<0){calLeftMonth=11;calLeftYear--;}
}

function toggleCal() {
  calOpen=!calOpen;
  const dd=document.getElementById('cal-dropdown');
  if(calOpen){
    dd.classList.add('open');
    document.getElementById('p-custom').classList.add('active');
    document.querySelectorAll('.period-btn').forEach(b=>b.classList.remove('active'));
    if(!calLeftYear) initCal();
    renderCalBoth();
    document.getElementById('cal-dropdown').addEventListener('click',e=>e.stopPropagation());
  setTimeout(()=>document.addEventListener('click',outsideCalClick),200);
  } else { closeCal(); }
}

function outsideCalClick(e) {
  const wrap=document.getElementById('custom-range');
  if(!wrap.contains(e.target)){
    closeCal();
    document.removeEventListener('click',outsideCalClick);
  }
}

function closeCal() {
  calOpen=false;
  document.getElementById('cal-dropdown').classList.remove('open');
  document.removeEventListener('click',outsideCalClick);
}

function renderCalBoth() {
  renderCalMonth('cal-left', calLeftYear, calLeftMonth);
  renderCalMonth('cal-right', calRightYear, calRightMonth);
}

function renderCalMonth(id, year, month) {
  const months=['ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'];
  const dows=['อา','จ','อ','พ','พฤ','ศ','ส'];
  const isLeft = id==='cal-left';
  const today=new Date(); today.setHours(0,0,0,0);
  const firstDay=new Date(year,month,1).getDay();
  const daysInMonth=new Date(year,month+1,0).getDate();

  let html=`<div class="cal-month-header">
    <button class="cal-nav" onclick="calNav('${id}',-1)">‹</button>
    <span class="cal-month-title">${months[month]} ${year}</span>
    <button class="cal-nav" onclick="calNav('${id}',1)">›</button>
  </div>
  <div class="cal-grid">`;
  dows.forEach(d=>html+=`<div class="cal-dow">${d}</div>`);
  for(let i=0;i<firstDay;i++) html+=`<div class="cal-day empty"></div>`;
  for(let d=1;d<=daysInMonth;d++){
    const dt=new Date(year,month,d);
    let cls='cal-day';
    if(dt.getTime()===today.getTime()) cls+=' today';
    if(calSelStart && dt.getTime()===calSelStart.getTime()) cls+=' selected';
    if(calSelEnd && dt.getTime()===calSelEnd.getTime()) cls+=' selected';
    if(calSelStart && calSelEnd && dt>calSelStart && dt<calSelEnd) cls+=' inrange';
    html+=`<div class="${cls}" onclick="calDayClick(${year},${month},${d},event)">${d}</div>`;
  }
  html+='</div>';
  document.getElementById(id).innerHTML=html;
}

function calNav(id, dir) {
  if(id==='cal-left'){
    calLeftMonth+=dir;
    if(calLeftMonth>11){calLeftMonth=0;calLeftYear++;}
    if(calLeftMonth<0){calLeftMonth=11;calLeftYear--;}
  } else {
    calRightMonth+=dir;
    if(calRightMonth>11){calRightMonth=0;calRightYear++;}
    if(calRightMonth<0){calRightMonth=11;calRightYear--;}
  }
  renderCalBoth();
}

function calDayClick(y,m,d,e) { if(e){e.stopPropagation();}
  const dt=new Date(y,m,d); dt.setHours(0,0,0,0);
  if(!calSelStart || (calSelStart && calSelEnd)){
    // เริ่มเลือกใหม่
    calSelStart=dt; calSelEnd=null;
  } else {
    // เลือกวันที่สอง
    if(dt.getTime()===calSelStart.getTime()){
      // คลิกวันเดิม = วันเดียว
      calSelEnd=dt;
    } else if(dt<calSelStart){
      calSelEnd=calSelStart; calSelStart=dt;
    } else {
      calSelEnd=dt;
    }
  }
  updateCalLabels();
  renderCalBoth();
}

function updateCalLabels() {
  const fmt=d=>d?`${String(d.getDate()).padStart(2,'0')}/${String(d.getMonth()+1).padStart(2,'0')}/${d.getFullYear()}`:'-';
  document.getElementById('cal-s-lbl').textContent=fmt(calSelStart);
  document.getElementById('cal-e-lbl').textContent=fmt(calSelEnd);
}

function applyCustom() {
  if(!calSelStart) return;
  CUSTOM_START = calSelStart;
  CUSTOM_END   = calSelEnd || calSelStart;
  PERIOD='custom';
  document.querySelectorAll('.period-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('p-custom').classList.add('active');
  const fmt=d=>`${String(d.getDate()).padStart(2,'0')}/${String(d.getMonth()+1).padStart(2,'0')}`;
  document.getElementById('cal-display').textContent=
    CUSTOM_START.getTime()===CUSTOM_END.getTime()
    ? fmt(CUSTOM_START)
    : fmt(CUSTOM_START)+' – '+fmt(CUSTOM_END);
  closeCal();
  renderPeriod();
}

// ── CACHE ─────────────────────────────────────────────────
const CACHE_KEY = 'pleats_raw_cache';
const CACHE_TTL = 5 * 60 * 1000; // 5 นาที

function saveCache(data) {
  try {
    localStorage.setItem(CACHE_KEY, JSON.stringify({ ts: Date.now(), data }));
  } catch(e) {}
}

function loadCache() {
  try {
    const c = JSON.parse(localStorage.getItem(CACHE_KEY)||'null');
    if (c && Date.now() - c.ts < CACHE_TTL) return c.data;
  } catch(e) {}
  return null;
}

// ── LOAD ─────────────────────────────────────────────────
async function loadData() {
  document.getElementById('btn-refresh').disabled = true;

  // แสดงข้อมูล cache ทันที ไม่ต้องรอ API
  const cached = loadCache();
  if (cached) {
    RAW = cached;
    renderPeriod();
    document.getElementById('loader').style.display = 'none';
    document.getElementById('main').style.display = 'block';
  } else {
    // ไม่มี cache → แสดง skeleton แทน spinner เต็มจอ
    document.getElementById('loader').style.display = 'none';
    document.getElementById('main').style.display = 'block';
    showSkeleton();
  }

  // โหลด API ใน background
  try {
    const r = await fetch(API_URL + '?action=all');
    const d = await r.json();
    if (!d.ok) throw new Error(d.error);
    RAW = d;
    saveCache(d);
    renderPeriod();
    document.getElementById('ts').textContent =
      new Date().toLocaleTimeString('th-TH',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
    document.getElementById('main').style.display = 'block';
  } catch(e) {
    if (!cached) {
      document.getElementById('loader').style.display = 'flex';
      document.getElementById('loader-text').textContent = '❌ '+e.message;
      setTimeout(()=>{ document.getElementById('loader').style.display='none'; },2500);
    }
    // ถ้ามี cache อยู่แล้ว แค่แสดง error เล็กๆ
    else {
      document.getElementById('ts').textContent = '⚠️ ใช้ข้อมูลเก่า';
    }
  } finally {
    document.getElementById('btn-refresh').disabled = false;
  }
}

// แปลง daily array → map { "dd/MM": {sales, orders} }
function buildDailyMap(d) {
  const map = {};
  (d.daily||[]).forEach(x => { map[x.date] = { sales: x.sales, orders: x.orders }; });
  return map;
}

// คำนวณยอดจาก daily map ตามช่วงวัน
function calcFromDaily(dailyMap, start, end) {
  let sales=0, orders=0;
  const cur = new Date(start); cur.setHours(0,0,0,0);
  const e   = new Date(end);   e.setHours(23,59,59,999);
  while (cur <= e) {
    const dd = String(cur.getDate()).padStart(2,'0');
    const mm = String(cur.getMonth()+1).padStart(2,'0');
    const k  = `${dd}/${mm}`;
    if (dailyMap[k]) { sales+=dailyMap[k].sales; orders+=dailyMap[k].orders; }
    cur.setDate(cur.getDate()+1);
  }
  return { sales, orders };
}

// แปลงวันที่จาก Apps Script → JS Date ที่ถูกต้อง
function parseOrderDate(str) {
  if (!str) return null;
  const parts = str.split('/');
  if (parts.length < 2) return null;
  let [dd, mm, yyyy] = parts;
  if (!yyyy) yyyy = String(new Date().getFullYear());
  let y = +yyyy;
  // ปี พ.ศ. เต็ม (2567, 2568) → ลบ 543
  if (y >= 2500 && y <= 2600) y = y - 543;
  // ปี ค.ศ. ผิด (2068 แทน 2025) → Apps Script timezone bug → บวก 500 แล้วลบ 543
  else if (y >= 2060 && y < 2100) y = y + 500 - 543;
  // ปี ค.ศ. ปกติ (2024, 2025, 2026) → ใช้ได้เลย
  return new Date(`${y}-${mm.padStart(2,'0')}-${dd.padStart(2,'0')}`);
}

// ── RENDER PERIOD ─────────────────────────────────────────
function renderPeriod() {
  if (!RAW) return;
  const { start, end, label, chartUnit } = getPeriodRange(PERIOD);
  const prev = getPrevRange(PERIOD, start, end);
  const s = RAW.summary?.summary || RAW.summary;
  const dailyMap = buildDailyMap(RAW);

  // คำนวณจาก daily data จริงๆ
  let cur = calcFromDaily(dailyMap, start, end);
  let prv = calcFromDaily(dailyMap, prev.start, prev.end);

  // ใช้ summary จาก API สำหรับ thisMonth, lastMonth, thisYear เท่านั้น
  if (cur.sales === 0 && cur.orders === 0) {
    switch(PERIOD) {
      case 'thisMonth': cur=s.thisMonth; prv=s.prevMonth; break;
      case 'lastMonth': cur=s.prevMonth; break;
      case 'thisYear':  cur=s.thisYear||s.total; break;
      default: break;
    }
  }

  document.getElementById('period-title').textContent = label;

  // pct change
  const pct = prv.sales>0 ? ((cur.sales-prv.sales)/prv.sales*100).toFixed(1) : null;
  const pctBadge = pct
    ? `<div class="badge ${+pct>=0?'up':'dn'}">${+pct>=0?'▲':'▼'} ${Math.abs(pct)}%</div>`
    : '';
  const avg = cur.orders>0 ? cur.sales/cur.orders : 0;

  // PERIOD STATS
  document.getElementById('period-stats').innerHTML = `
    <div class="stat" style="--sa:linear-gradient(90deg,var(--accent),var(--accent2));--sc:var(--accent)">
      <div class="stat-ac"></div><div class="stat-icon">💰</div>
      <div class="stat-lbl">ยอดขาย</div>
      <div class="stat-val">฿${fmt(cur.sales)}</div>
      ${pctBadge}
    </div>
    <div class="stat" style="--sa:linear-gradient(90deg,var(--green),#6ee7b7);--sc:var(--green)">
      <div class="stat-ac"></div><div class="stat-icon">🛍️</div>
      <div class="stat-lbl">ออเดอร์</div>
      <div class="stat-val">${cur.orders}</div>
      <div class="stat-sub">เฉลี่ย ฿${fmt(avg)}/ออเดอร์</div>
    </div>
    <div class="stat" style="--sa:linear-gradient(90deg,var(--gold),#fcd34d);--sc:var(--gold)">
      <div class="stat-ac"></div><div class="stat-icon">📊</div>
      <div class="stat-lbl">${prev.label}</div>
      <div class="stat-val">฿${fmt(prv.sales)}</div>
      <div class="stat-sub">${prv.orders} ออเดอร์</div>
    </div>
    <div class="stat" style="--sa:linear-gradient(90deg,var(--blue),#93c5fd);--sc:var(--blue)">
      <div class="stat-ac"></div><div class="stat-icon">👑</div>
      <div class="stat-lbl">VIP ลูกค้าประจำ</div>
      <div class="stat-val">${RAW.vip?.length||0}</div>
      <div class="stat-sub">ซื้อ 3+ ครั้งทั้งหมด</div>
    </div>
  `;

  // CHART
  renderChart(chartUnit, label);

  // PRODUCTS
  const prods = RAW.products || [];
  const maxP  = prods[0]?.sales||1;
  document.getElementById('products').innerHTML = prods.length
    ? prods.slice(0,8).map((p,i)=>`
      <div class="prod-item">
        <div class="prod-top">
          <span class="prod-name">${p.sku} <span style="font-size:10px;color:var(--muted)">(${p.orders})</span></span>
          <span class="prod-val">฿${fmt(p.sales)}</span>
        </div>
        <div class="prog"><div class="prog-fill ${i===0?'top':''}" style="width:${(p.sales/maxP*100).toFixed(0)}%"></div></div>
      </div>`).join('')
    : '<div class="empty">ไม่มีข้อมูล</div>';

  // COMPARISON
  const cmpData = [
    { lbl:'วันนี้',        cur:s.today.sales,     prev:s.prevMonth.sales/30 },
    { lbl:'เดือนนี้',      cur:s.thisMonth.sales,  prev:s.prevMonth.sales },
    { lbl:'เดือนที่แล้ว', cur:s.prevMonth.sales,  prev:null },
    { lbl:'ปีนี้',         cur:s.thisYear?.sales||0, prev:null },
  ];
  const maxCmp = Math.max(...cmpData.map(c=>Math.max(c.cur,c.prev||0)),1);
  document.getElementById('comparison').innerHTML = cmpData.map(c=>`
    <div class="cmp-row">
      <div class="cmp-lbl">${c.lbl}</div>
      <div class="cmp-bar-wrap"><div class="cmp-bar cur" style="width:${(c.cur/maxCmp*100).toFixed(0)}%"></div></div>
      <div class="cmp-val">฿${fmt(c.cur)}</div>
    </div>`).join('');

  // RECENT — กรองตามช่วงเวลาที่เลือก
  const allFiltered = (RAW.recent || []).filter(o => {
    const d = parseOrderDate(o.date);
    return d && d >= start && d <= end;
  });
  document.getElementById('recent').innerHTML = allFiltered.length
    ? allFiltered.slice(-10).reverse().map(o=>`
      <div class="order-row">
        <div class="o-dot"></div>

      </div>`).join('')
    : '<div class="empty">ไม่มีออเดอร์ในช่วงนี้</div>';

  // TOP CUSTOMERS — คำนวณจากออเดอร์ทั้งหมดในช่วงที่เลือก (ไม่ใช่แค่ 10 รายการ)
  const custMap = {};
  allFiltered.forEach(o => {
    const name = (o.customer||'').trim();
    if (!name) return;
    if (!custMap[name]) custMap[name] = { name, total: 0, orders: 0 };
    custMap[name].total  += +o.amount || 0;
    custMap[name].orders += 1;
  });
  const topCusts = Object.values(custMap).sort((a,b)=>b.total-a.total).slice(0,10);
  const maxCustAmt = topCusts[0]?.total || 1;
  const rankIcon = i => i===0?'🥇':i===1?'🥈':i===2?'🥉':`${i+1}.`;
  const rankCls  = i => i===0?'top1':i===1?'top2':i===2?'top3':'';
  document.getElementById('top-customers').innerHTML = topCusts.length
    ? topCusts.map((c,i)=>`
      <div class="cust-row">
        <div class="cust-rank ${rankCls(i)}">${rankIcon(i)}</div>
        <div class="cust-info">
          <div class="cust-name">${c.name}</div>
          <div class="cust-meta">${c.orders} ออเดอร์</div>
        </div>
        <div class="cust-bar-wrap"><div class="cust-bar ${i===0?'top':''}" style="width:${(c.total/maxCustAmt*100).toFixed(0)}%"></div></div>
        <div class="cust-amt">฿${fmt(c.total)}</div>
      </div>`).join('')
    : '<div class="empty">ไม่มีข้อมูลลูกค้าในช่วงนี้</div>';

  // YEARLY
  const yearly = RAW.yearly || [];
  const maxY = Math.max(...yearly.map(y=>y.sales),1);
  document.getElementById('yearly').innerHTML = yearly.length
    ? yearly.map(y=>`
      <div class="yr-row">
        <div class="yr-label">${y.year}</div>
        <div style="background:var(--border);border-radius:3px;height:8px;overflow:hidden">
          <div style="width:${(y.sales/maxY*100).toFixed(0)}%;height:100%;background:var(--accent3);border-radius:3px;transition:width .8s"></div>
        </div>
        <div style="font-family:var(--mono);font-size:12px;color:var(--accent);text-align:right">฿${fmt(y.sales)}</div>
        <div style="font-size:11px;color:var(--muted);text-align:right">${y.orders} ออเดอร์</div>
      </div>`).join('')
    : '<div class="empty">ไม่มีข้อมูล</div>';
}

function renderChart(unit, label) {
  if (!RAW) return;
  document.getElementById('chart-title').textContent =
    unit==='month' ? `📊 ยอดขายรายเดือน — ${label}` : `📊 ยอดขายรายวัน — ${label}`;

  const daily = RAW.daily || [];
  if (!daily.length) { document.getElementById('main-chart').innerHTML='<div class="empty">ไม่มีข้อมูล</div>'; return; }

  // กรองตาม period
  let data = daily;
  const n = PERIOD==='7days' ? 7 : PERIOD==='today'||PERIOD==='yesterday' ? 1 :
            PERIOD==='lastMonth' ? 30 : PERIOD==='thisYear' ? 365 : 30;
  if (PERIOD==='yesterday') data = [daily[daily.length-2]||daily[daily.length-1]];
  else if (PERIOD==='today') data = [daily[daily.length-1]];
  else data = daily.slice(-n);

  if (unit==='month') {
    // group by month
    const map = {};
    data.forEach(d=>{
      const key = d.date.split('/')[1]; // MM
      if (!map[key]) map[key]={label:d.date.split('/')[1]+'/'+d.date.split('/')[0].slice(-2)||'', sales:0, orders:0};
      map[key].sales+=d.sales; map[key].orders+=d.orders;
    });
    data = Object.values(map);
  }

  const maxS = Math.max(...data.map(d=>d.sales),1);
  const peakI= data.reduce((mi,x,i,a)=>x.sales>a[mi].sales?i:mi,0);
  document.getElementById('main-chart').innerHTML = data.map((d,i)=>`
    <div class="bar-g">
      <div class="b ${i===peakI?'peak':''}" style="height:${Math.max(d.sales/maxS*110,2).toFixed(0)}px">
        <div class="tip">${d.date||d.label}: ฿${fmt(d.sales)}<br>${d.orders} ออเดอร์</div>
      </div>
      <div class="lbl">${d.date||d.label}</div>
    </div>`).join('');
}

// FORM
function openForm(){
  document.getElementById('f-date').value=new Date().toISOString().slice(0,10);
  document.getElementById('form-overlay').style.display='flex';
}
function closeForm(){ document.getElementById('form-overlay').style.display='none'; }
async function submitOrder(){
  const payload={ action:'add_order',
    date:document.getElementById('f-date').value,
    customer:document.getElementById('f-customer').value,
    sku:document.getElementById('f-sku').value,
    qty:document.getElementById('f-qty').value,
    amount:document.getElementById('f-amount').value,
    channel:document.getElementById('f-channel').value,
  };
  if(!payload.amount||+payload.amount<=0){alert('กรุณาใส่ยอดเงิน');return;}
  const form=new FormData();
  Object.entries(payload).forEach(([k,v])=>form.append(k,v));
  try{
    const r=await fetch(API_URL,{method:'POST',body:form});
    const d=await r.json();
    if(!d.ok)throw new Error(d.error);
    closeForm(); loadData();
  }catch(e){alert('บันทึกไม่สำเร็จ: '+e.message);}
}

// default range
initCal();

loadData();
setInterval(loadData, 5*60*1000);
</script>
